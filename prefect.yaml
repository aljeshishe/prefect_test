pull:
  - prefect.deployments.steps.git_clone:
      repository: https://gitlab.alberblanc.com/aleksei.grachev/prefect_server.git
      branch: master
      credentials: "{{ prefect.blocks.gitlab-credentials.prefect-server-gitlab-creds }}"

deployments:
  - name: fetch-google-no-docker
    entrypoint: flow_no_docker/fetch_google.py:fetch_google
    work_pool:
      name: no-docker-pool
    schedule:
      interval: 60
