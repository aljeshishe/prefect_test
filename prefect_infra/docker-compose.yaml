networks:
  prefect-network:
    name: prefect-network

volumes:
  postgres_data:

services:
  postgres:
    image: postgres:14
    networks:
      - prefect-network
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 5s
      timeout: 5s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3-latest
    networks:
      - prefect-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: "postgresql+asyncpg://prefect:prefect@postgres:5432/prefect"
      PREFECT_SERVER_API_HOST: "0.0.0.0"
      PREFECT_UI_API_URL: "http://10.17.78.125:4200/api"
    command: prefect server start
    ports:
      - "4200:4200"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  prefect-worker:
    image: prefecthq/prefect:3-latest
    networks:
      - prefect-network
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: "http://prefect-server:4200/api"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "pip install prefect-docker &&
               prefect worker start --pool docker-pool --type docker"
    restart: on-failure

  prefect-worker-no-docker:
    image: prefecthq/prefect:3-latest
    networks:
      - prefect-network
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: "http://prefect-server:4200/api"
    command: >
      bash -c "apt-get update && apt-get install -y git &&
               pip install requests prefect-gitlab &&
               prefect worker start --pool no-docker-pool --type process"
    restart: on-failure
